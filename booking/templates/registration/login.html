{% extends 'booking/base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
    <h2>Login to Book</h2>
    <form method="post">
        {% csrf_token %}
        <div style="text-align: left;">{{ form.as_p }}</div>
        <button type="submit" style="width: 100%; background: #333; color: white; border: none; padding: 12px; border-radius: 8px;">Login</button>
    </form>
    <p>New user? <a href="/signup/" style="color: #ff4d4d;">Create an account</a></p>
</div>
{% endblock %}
